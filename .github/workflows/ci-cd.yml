name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build images for"
        required: false
        default: ""
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC for security audit

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Run tests for all services.
  test:
    runs-on: skoda
    strategy:
      max-parallel: 5
      matrix:
        service:
          - skodachargecollector
          - skodachargefinder
          - skodachargefrontend
          - skodaupdatechargeprices
          - skodaimporter
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Show Python version
        run: python -V

      # Cache pip dependencies for faster builds.
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/requirements.txt',
            matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc --format=json --output=audit-results.json || true
            pip-audit -r requirements.txt --desc
          else
            echo "No requirements.txt found in ${{ matrix.service }}, skipping audit"
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-results-${{ matrix.service }}
          path: ${{ matrix.service }}/audit-results.json
          if-no-files-found: ignore

      - name: Install dependencies (only when tests exist)
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then \
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi; \
          else \
            echo "No tests in ${{ matrix.service }}, skipping dependency install"; \
          fi

      - name: Install pytest (if tests exist)
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then pip install pytest pytest-cov pytest-asyncio; fi

      - name: Run tests (if tests exist)
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests in ${{ matrix.service }}, skipping"; fi

  kustomize-validate:
    runs-on: skoda
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify dev schema copy is in sync
        run: |
          if ! cmp -s sqldump/sqldump.sql k8s/overlays/dev/sqldump.sql; then
            echo "k8s/overlays/dev/sqldump.sql is out of sync with sqldump/sqldump.sql"
            echo "Please copy sqldump/sqldump.sql to k8s/overlays/dev/sqldump.sql"
            diff -u sqldump/sqldump.sql k8s/overlays/dev/sqldump.sql | head -n 200 || true
            exit 1
          fi

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: "5.6.0"

      - name: Validate prod overlay
        run: kustomize build k8s/overlays/prod > /dev/null

      - name: Validate dev overlay
        run: kustomize build k8s/overlays/dev > /dev/null

  changed-services:
    runs-on: skoda
    outputs:
      skodaimporter: ${{ steps.filter.outputs.skodaimporter }}
      skodachargefinder: ${{ steps.filter.outputs.skodachargefinder }}
      skodachargecollector: ${{ steps.filter.outputs.skodachargecollector }}
      skodaupdatechargeprices: ${{ steps.filter.outputs.skodaupdatechargeprices }}
      skodachargefrontend: ${{ steps.filter.outputs.skodachargefrontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch
            != '' && github.event.inputs.branch || github.ref }}

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch
            != '' && github.event.inputs.branch || github.ref }}
          filters: |
            skodaimporter:
              - 'skodaimporter/**'
            skodachargefinder:
              - 'skodachargefinder/**'
            skodachargecollector:
              - 'skodachargecollector/**'
            skodaupdatechargeprices:
              - 'skodaupdatechargeprices/**'
            skodachargefrontend:
              - 'skodachargefrontend/**'

  # Step 3a: Build test images (for non-main branches and PRs)
  build-test-images:
    if: github.ref != 'refs/heads/main'
    needs: [ test, kustomize-validate, changed-services ]
    runs-on: skoda
    timeout-minutes: 90
    strategy:
      max-parallel: 5
      matrix:
        include:
          - image: ghcr.io/tn8or/skodaimporter
            context-path: ./skodaimporter
          - image: ghcr.io/tn8or/skodachargefinder
            context-path: ./skodachargefinder
          - image: ghcr.io/tn8or/skodachargecollector
            context-path: ./skodachargecollector
          - image: ghcr.io/tn8or/skodaupdatechargeprices
            context-path: ./skodaupdatechargeprices
          - image: ghcr.io/tn8or/skodachargefrontend
            context-path: ./skodachargefrontend

    steps:
      - name: Determine if service changed
        id: service_changed
        shell: bash
        run: |
          case "${{ matrix.context-path }}" in
            ./skodaimporter)
              echo "changed=${{ needs.changed-services.outputs.skodaimporter }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodachargefinder)
              echo "changed=${{ needs.changed-services.outputs.skodachargefinder }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodachargecollector)
              echo "changed=${{ needs.changed-services.outputs.skodachargecollector }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodaupdatechargeprices)
              echo "changed=${{ needs.changed-services.outputs.skodaupdatechargeprices }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodachargefrontend)
              echo "changed=${{ needs.changed-services.outputs.skodachargefrontend }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout repository
        if: steps.service_changed.outputs.changed == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch
            != '' && github.event.inputs.branch || github.event_name ==
            'schedule' && 'main' || github.ref }}

      - name: Set up QEMU
        if: steps.service_changed.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.service_changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=50000000

      - name: Log in to the Container registry
        if: steps.service_changed.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.service_changed.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=test
            type=ref,event=branch,suffix=-test
            type=sha,suffix=-test

      - name: Compute build args (commit, tag, date)
        if: steps.service_changed.outputs.changed == 'true'
        id: buildargs
        shell: bash
        run: |
          echo "git_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          TAG=$(git describe --tags --always --dirty || echo)
          echo "git_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          # Extract service name from context path for cache key
          SERVICE_NAME=$(basename ${{ matrix.context-path }})
          echo "service_name=${SERVICE_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push Docker test image
        if: github.actor != 'dependabot[bot]' && steps.service_changed.outputs.changed
          == 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64, linux/arm64
          context: ${{ matrix.context-path }}
          file: ${{ matrix.context-path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.buildargs.outputs.git_commit }}
            GIT_TAG=${{ steps.buildargs.outputs.git_tag }}
            BUILD_DATE=${{ steps.buildargs.outputs.build_date }}
            BASE_REGISTRY=mirror.gcr.io/library/
            PYTHON_IMAGE=mirror.gcr.io/library/python:3.13-alpine
          cache-from: |
            type=gha,scope=${{ github.ref_name }}-${{ steps.buildargs.outputs.service_name }}
            type=gha,scope=main-${{ steps.buildargs.outputs.service_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{
            steps.buildargs.outputs.service_name }}

      - name: Skip unchanged service image
        if: steps.service_changed.outputs.changed != 'true'
        run: echo "Skipping image build for ${{ matrix.context-path }} (no service
          changes detected)"

  # Step 3b: Build production images (for main branch only)
  build-production-images:
    if: github.ref == 'refs/heads/main'
    needs: [ test, kustomize-validate, changed-services ]
    runs-on: skoda
    timeout-minutes: 90
    strategy:
      max-parallel: 5
      matrix:
        include:
          - image: ghcr.io/tn8or/skodaimporter
            context-path: ./skodaimporter
          - image: ghcr.io/tn8or/skodachargefinder
            context-path: ./skodachargefinder
          - image: ghcr.io/tn8or/skodachargecollector
            context-path: ./skodachargecollector
          - image: ghcr.io/tn8or/skodaupdatechargeprices
            context-path: ./skodaupdatechargeprices
          - image: ghcr.io/tn8or/skodachargefrontend
            context-path: ./skodachargefrontend

    steps:
      - name: Determine if service changed
        id: service_changed
        shell: bash
        run: |
          case "${{ matrix.context-path }}" in
            ./skodaimporter)
              echo "changed=${{ needs.changed-services.outputs.skodaimporter }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodachargefinder)
              echo "changed=${{ needs.changed-services.outputs.skodachargefinder }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodachargecollector)
              echo "changed=${{ needs.changed-services.outputs.skodachargecollector }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodaupdatechargeprices)
              echo "changed=${{ needs.changed-services.outputs.skodaupdatechargeprices }}" >> "$GITHUB_OUTPUT"
              ;;
            ./skodachargefrontend)
              echo "changed=${{ needs.changed-services.outputs.skodachargefrontend }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout repository
        if: steps.service_changed.outputs.changed == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch
            != '' && github.event.inputs.branch || github.event_name ==
            'schedule' && 'main' || github.ref }}

      - name: Set up QEMU
        if: steps.service_changed.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.service_changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=50000000

      - name: Log in to the Container registry
        if: steps.service_changed.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.service_changed.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute build args (commit, tag, date)
        if: steps.service_changed.outputs.changed == 'true'
        id: buildargs
        shell: bash
        run: |
          echo "git_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          TAG=$(git describe --tags --always --dirty || echo)
          echo "git_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          # Extract service name from context path for cache key
          SERVICE_NAME=$(basename ${{ matrix.context-path }})
          echo "service_name=${SERVICE_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push Docker production image
        if: github.actor != 'dependabot[bot]' && steps.service_changed.outputs.changed
          == 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64, linux/arm64
          context: ${{ matrix.context-path }}
          file: ${{ matrix.context-path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.buildargs.outputs.git_commit }}
            GIT_TAG=${{ steps.buildargs.outputs.git_tag }}
            BUILD_DATE=${{ steps.buildargs.outputs.build_date }}
            BASE_REGISTRY=mirror.gcr.io/library/
            PYTHON_IMAGE=mirror.gcr.io/library/python:3.13-alpine
          cache-from: |
            type=gha,scope=main-${{ steps.buildargs.outputs.service_name }}
          cache-to: type=gha,mode=max,scope=main-${{ steps.buildargs.outputs.service_name
            }}

      - name: Skip unchanged service image
        if: steps.service_changed.outputs.changed != 'true'
        run: echo "Skipping image build for ${{ matrix.context-path }} (no service
          changes detected)"
