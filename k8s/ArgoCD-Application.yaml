apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skoda
  namespace: argocd
spec:
  project: default

  # ArgoCD will reconcile manifests from this source repository
  source:
    repoURL: https://github.com/tn8or/skoda
    path: k8s/overlays/prod  # or k8s/overlays/dev for development
    targetRevision: main

  # Target deployment cluster and namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: skoda

  # Sync policy: automatic synchronization with pruning
  syncPolicy:
    automated:
      prune: true       # Delete resources removed from Git
      selfHeal: true    # Resync when cluster state diverges
    syncOptions:
    - CreateNamespace=true   # Create namespace if it doesn't exist
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Server-side apply for better handling of large manifests
  additionalPrometheusRulesEnabled: false

---
# Optional: ApplicationSet for multi-environment deployments
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: skoda-multi-env
  namespace: argocd
spec:
  goTemplate: true
  generators:
  - list:
      elements:
      - cluster: production
        environment: prod
      - cluster: staging
        environment: dev

  template:
    metadata:
      name: skoda-{{.environment}}
    spec:
      project: default
      source:
        repoURL: https://github.com/tn8or/skoda
        path: k8s/overlays/{{.environment}}
        targetRevision: main
      destination:
        server: "{{.cluster}}"
        namespace: skoda
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
