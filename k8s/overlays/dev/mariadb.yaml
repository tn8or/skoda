apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: skoda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mariadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/part-of: skoda
    spec:
      containers:
      - name: mariadb
        image: mariadb:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        env:
        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mariadb-app-config
              key: MARIADB_DATABASE
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-credentials
              key: MARIADB_USERNAME
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-credentials
              key: MARIADB_PASSWORD
        - name: MARIADB_RANDOM_ROOT_PASSWORD
          value: "yes"
        readinessProbe:
          tcpSocket:
            port: mysql
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: mysql
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "768Mi"
        volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
        - name: mariadb-init-schema
          mountPath: /docker-entrypoint-initdb.d/sqldump.sql
          subPath: sqldump.sql
          readOnly: true
      volumes:
      - name: mariadb-data
        emptyDir: {}
      - name: mariadb-init-schema
        configMap:
          name: mariadb-init-schema
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: skoda
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mariadb
  ports:
  - name: mysql
    protocol: TCP
    port: 3306
    targetPort: mysql
